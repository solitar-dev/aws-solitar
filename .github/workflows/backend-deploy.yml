name: Backend Deploy

# Builds the GraalVM native ARM64 image and rolls it out to ECS Fargate.
# The repo is public, so it runs on GitHub's free native ARM64 runner (ubuntu-24.04-arm): the arm64
# image builds natively, no QEMU emulation. Buildx is kept only for the GitHub Actions layer cache.
on:
  push:
    branches: [main]
    paths:
      - "apps/backend/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write # OIDC, no long-lived AWS keys
  contents: read

env:
  AWS_REGION: ap-southeast-1

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image reference
        id: img
        run: echo "image=${{ steps.ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push native arm64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.img.outputs.image }}
            ${{ steps.ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Terraform owns the base task definition; CI only swaps the image tag. Pull the live def and
      # strip the read-only fields registerTaskDefinition rejects.
      - name: Render task definition
        id: render
        run: |
          aws ecs describe-task-definition \
            --task-definition "${{ vars.ECS_TASK_FAMILY }}" \
            --query 'taskDefinition' --output json \
            | jq 'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)' \
            > task-definition.json

      - name: Inject new image
        id: taskdef
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: aws-solitar
          image: ${{ steps.img.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.taskdef.outputs.task-definition }}
          service: ${{ vars.ECS_SERVICE }}
          cluster: ${{ vars.ECS_CLUSTER }}
          wait-for-service-stability: true
