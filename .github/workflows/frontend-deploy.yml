name: Frontend Deploy

# Generates the static Nuxt site and publishes it to S3 + CloudFront (replaces the old Cloudflare
# Workers deploy from the pre-AWS architecture).
on:
  push:
    branches: [main]
    paths:
      - "apps/frontend/**"
      - "packages/**"
      - ".github/workflows/frontend-deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate static site
        run: pnpm --filter @solitar/frontend generate

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        env:
          BUCKET: ${{ vars.FRONTEND_BUCKET }}
          DIST: apps/frontend/.output/public
        run: |
          # 1) Immutable, content-hashed assets first (additive, long cache).
          aws s3 sync "$DIST/_nuxt" "s3://$BUCKET/_nuxt" \
            --cache-control "public,max-age=31536000,immutable" --delete
          if [ -d "$DIST/_fonts" ]; then
            aws s3 sync "$DIST/_fonts" "s3://$BUCKET/_fonts" \
              --cache-control "public,max-age=31536000,immutable" --delete
          fi
          # 2) Everything else (HTML, og-images, i18n, payloads, icons) last, short cache, prune stale.
          aws s3 sync "$DIST" "s3://$BUCKET" \
            --cache-control "public,max-age=0,must-revalidate" --delete \
            --exclude "_nuxt/*" --exclude "_fonts/*"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths '/*'
