name: solitar
services:
  solitar:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
    container_name: solitar
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DYNAMODB_ENDPOINT: http://localstack:4566
      AWS_SQS_ENDPOINT: http://localstack:4566
    depends_on:
      localstack:
        condition: service_healthy

  localstack:
    image: localstack/localstack:latest
    container_name: solitar-localstack
    restart: on-failure
    ports:
      - "127.0.0.1:4566:4566"
    environment:
      SERVICES: dynamodb,sqs
      DEBUG: "0"
    volumes:
      - ./apps/backend/localstack-init:/etc/localstack/init/ready.d:ro
    healthcheck:
      test:
        ["CMD-SHELL", "awslocal dynamodb describe-table --table-name urls && awslocal sqs get-queue-url --queue-name link-forwarded"]
      interval: 5s
      timeout: 10s
      retries: 15
