spring:
  application:
    name: solitar
  main:
    banner-mode: off
  profiles:
    default: prod
  cloud:
    aws:
      region:
        static: ${AWS_REGION:us-east-1}
      # No static credentials / endpoint here: prod resolves the ECS task IAM role via the
      # DefaultCredentialsProvider and the real AWS endpoints. The dev profile + tests override
      # credentials and endpoints to point at LocalStack.

  # ElastiCache (Valkey) over Lettuce. Local/dev points at the loopback valkey container (no TLS);
  # prod is injected with the serverless endpoint + VALKEY_SSL=true via the ECS task env (phase-02).
  data:
    redis:
      host: ${VALKEY_HOST:localhost}
      port: ${VALKEY_PORT:6379}
      ssl:
        enabled: ${VALKEY_SSL:false}

server:
  forward-headers-strategy: framework
  port: ${BACKEND_SERVER_PORT:8080}
