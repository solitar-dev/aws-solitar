spring:
  application:
    name: solitar
  main:
    banner-mode: off
  profiles:
    default: prod
  cloud:
    aws:
      region:
        static: ${AWS_REGION:us-east-1}
      # No static credentials / endpoint here: prod resolves the ECS task IAM role via the
      # DefaultCredentialsProvider and the real AWS endpoints. The dev profile + tests override
      # credentials and endpoints to point at LocalStack.

server:
  forward-headers-strategy: framework
  port: ${BACKEND_SERVER_PORT:8080}
