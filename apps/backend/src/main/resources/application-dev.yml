spring:
  application:
    version: 1.0.0-dev
  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID:test}
        secret-key: ${AWS_SECRET_ACCESS_KEY:test}
      dynamodb:
        endpoint: ${AWS_DYNAMODB_ENDPOINT:http://localhost:4566}
      sqs:
        endpoint: ${AWS_SQS_ENDPOINT:http://localhost:4566}

app:
  cors:
    allowed-origins:
      - "http://localhost:3000"
      - "https://aws.fugiat.store"
  rate-limiter:
    capacity: 10
    refill-period-in-seconds: 30
